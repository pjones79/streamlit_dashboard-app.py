[theme]
base = "dark"
primaryColor = "#38bdf8"
backgroundColor = "#0b1220"
secondaryBackgroundColor = "#141d2e"
textColor = "#e2e8f0"
font = "sans serif"

[server]
headless = true
address = "127.0.0.1"
port = 8501
enableXsrfProtection = false
enableCORS = true
fileWatcherType = "none"

[browser]
gatherUsageStats = false
serverAddress = "127.0.0.1"
serverPort = 8501

[client]
# Hide default MPA links ("app", extra pages) so the sidebar starts with Flight tracker / My Roster.
showSidebarNavigation = false
